<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Barril</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; margin-top: 0; text-align: center; font-size: 1.5rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #666; font-weight: 600; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 2px solid #e1e5eb; border-radius: 8px; outline: none; transition: border-color 0.3s; font-size: 1rem; }
        input:focus { border-color: #007bff; }
        button { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #mensagem { margin-top: 20px; text-align: center; font-size: 0.9rem; padding: 10px; border-radius: 6px; display: none; }
        .sucesso { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .erro { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="card">
    <h2>Novo Barril</h2>
    <form id="formBarril">
        <div class="form-group">
            <label for="deProduto">Descrição do Produto</label>
            <input type="text" id="deProduto" placeholder="Ex: Barril de Ácido Clorídrico cód. 4839" required>
        </div>

        <div class="form-group">
            <label for="vlLitrosTotal">Volume Total (Litros)</label>
            <input type="number" id="vlLitrosTotal" step="0.01" placeholder="50.00" required>
        </div>

        <button type="submit" id="btnEnviar">Cadastrar Barril</button>
    </form>
    <div id="mensagem"></div>
</div>

<script>
    document.getElementById('formBarril').addEventListener('submit', async (e) => {
        e.preventDefault();

        const btn = document.getElementById('btnEnviar');
        const msg = document.getElementById('mensagem');
        
        // Captura os valores
        const deProduto = document.getElementById('deProduto').value;
        const vlTotal = parseFloat(document.getElementById('vlLitrosTotal').value);

        // Monta o JSON
        const dados = {
            deProduto: deProduto,
            vlLitrosTotal: vlTotal
        };

        btn.disabled = true;
        btn.innerText = 'Enviando...';
        msg.style.display = 'none';

        try {
            const resposta = await fetch('cadBarril.php', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify(dados)
            });

            const resultado = await resposta.json();

            msg.style.display = 'block';
            if (resultado.success) {
                msg.className = 'sucesso';
                msg.innerText = resultado.message;
                document.getElementById('formBarril').reset();
            } else {
                msg.className = 'erro';
                msg.innerText = 'Erro: ' + (resultado.message || 'Erro desconhecido');
            }
        } catch (error) {
            console.error(error);
            msg.style.display = 'block';
            msg.className = 'erro';
            msg.innerText = 'Erro ao conectar com o servidor.';
        } finally {
            btn.disabled = false;
            btn.innerText = 'Cadastrar Barril';
        }
    });
</script>

</body>
</html>
